<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Gold Ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Inner Black Ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="black" stroke-width="8"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="black" stroke-width="4"/>
  
  <!-- Gear Background (bottom) -->
  <g transform="translate(100, 50)">
    <!-- Gear teeth -->
    <path d="M -8,-12 L -4,-16 L 0,-12 L 4,-16 L 8,-12 L 10,-14 L 10,-8 L 8,-10 L 4,-8 L 0,-10 L -4,-8 L -8,-10 L -10,-8 L -10,-14 Z" fill="black"/>
  </g>
  
  <!-- Orange Building (back) -->
  <g transform="translate(100, 45)">
    <!-- Main building -->
    <rect x="-25" y="-8" width="50" height="28" fill="#FF8C42" stroke="black" stroke-width="1.5"/>
    <!-- Roof -->
    <polygon points="-28,-8 0,-18 28,-8" fill="#FF6B1A" stroke="black" stroke-width="1.5"/>
    <!-- Columns -->
    <g stroke="black" stroke-width="1">
      <rect x="-22" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="-16" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="-10" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="-4" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="2" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="8" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="14" y="-5" width="4" height="20" fill="#FF8C42"/>
      <rect x="20" y="-5" width="4" height="20" fill="#FF8C42"/>
    </g>
    <!-- Windows -->
    <g fill="black" opacity="0.3">
      <circle cx="-20" cy="0" r="2"/>
      <circle cx="-14" cy="0" r="2"/>
      <circle cx="-8" cy="0" r="2"/>
      <circle cx="-2" cy="0" r="2"/>
      <circle cx="4" cy="0" r="2"/>
      <circle cx="10" cy="0" r="2"/>
      <circle cx="16" cy="0" r="2"/>
      <circle cx="22" cy="0" r="2"/>
    </g>
  </g>
  
  <!-- Motorcycle -->
  <g transform="translate(100, 70)">
    <!-- Motorcycle Body -->
    <ellipse cx="0" cy="-5" rx="18" ry="12" fill="#FF8C42" stroke="black" stroke-width="2"/>
    <!-- Seat -->
    <rect x="-8" y="-12" width="16" height="4" rx="2" fill="#FF6B1A" stroke="black" stroke-width="1"/>
    <!-- Handlebar -->
    <path d="M -6,-14 Q -8,-16 -6,-18" stroke="black" stroke-width="2" fill="none"/>
    <path d="M 6,-14 Q 8,-16 6,-18" stroke="black" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Front Wheel -->
  <circle cx="65" cy="95" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="65" cy="95" r="8" fill="none" stroke="#FF8C42" stroke-width="2"/>
  <circle cx="65" cy="95" r="4" fill="white" stroke="black" stroke-width="1"/>
  <g stroke="black" stroke-width="1" opacity="0.6">
    <line x1="65" y1="87" x2="65" y2="103"/>
    <line x1="57" y1="95" x2="73" y2="95"/>
    <line x1="59" y1="89" x2="71" y2="101"/>
    <line x1="71" y1="89" x2="59" y2="101"/>
  </g>
  
  <!-- Rear Wheel -->
  <circle cx="135" cy="95" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="135" cy="95" r="8" fill="none" stroke="#FF8C42" stroke-width="2"/>
  <circle cx="135" cy="95" r="4" fill="white" stroke="black" stroke-width="1"/>
  <g stroke="black" stroke-width="1" opacity="0.6">
    <line x1="135" y1="87" x2="135" y2="103"/>
    <line x1="127" y1="95" x2="143" y2="95"/>
    <line x1="129" y1="89" x2="141" y2="101"/>
    <line x1="141" y1="89" x2="129" y2="101"/>
  </g>
  
  <!-- Bottom Banner -->
  <rect x="50" y="125" width="100" height="25" fill="white" stroke="black" stroke-width="2" rx="4"/>
  
  <!-- Text: PUNEKAR -->
  <text x="100" y="142" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF8C42" text-anchor="middle">PUNEKAR</text>
  
  <!-- Text: BIKE'S POINT -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="black" text-anchor="middle">BIKE'S POINT</text>
  
  <!-- Bottom Gear Shape -->
  <g transform="translate(100, 175)">
    <path d="M -12,0 L -8,-6 L -4,0 L 0,-6 L 4,0 L 8,-6 L 12,0 L 10,4 L -10,4 Z" fill="black"/>
  </g>
  
  <!-- Tagline -->
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="8" fill="black" text-anchor="middle" letter-spacing="2">SALE &amp; PURCHASE</text>
</svg>